<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AEIS Security Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>AEIS IoT Security Monitoring Dashboard</h1>

<div class="status-panel">

<div class="card">
<h3>Device</h3>
<p id="deviceIP">Android Camera</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="deviceStatus" class="normal">NORMAL</p>
</div>

<div class="card">
<h3>Threat Level</h3>
<p id="threatLevel" class="safe">LOW</p>
</div>

</div>

<!-- 🔥 NEW MODEL OUTPUT SECTION -->
<div class="status-panel">

<div class="card">
<h3>RF Attack Probability</h3>
<p id="rfProb">0</p>
</div>

<div class="card">
<h3>Isolation Score</h3>
<p id="isoScore">0</p>
</div>

</div>

<div class="chart-container">

<h2>Network Traffic Activity</h2>

<canvas id="trafficChart"></canvas>

</div>

</div>

<script src="dashboard.js"></script>
<p>RF Probability: <span id="rfProb">0</span></p>
<p>ISO Score: <span id="isoScore">0</span></p>
<p>Model Decision: <span id="modelDecision">NORMAL</span></p>
</body>
</html>
